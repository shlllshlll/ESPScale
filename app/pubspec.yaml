publish_to: 'none'
version: 0.2.0

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  dio: ^5.4.0
  web_socket_channel: ^3.0.3
  fl_chart: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  flutter_blue_plus: ^2.3.8

dev_dependencies:
